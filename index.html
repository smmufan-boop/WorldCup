<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>足球红黑榜</title>
  <style>
    :root {
      --bg: #eef5ff;
      --panel: #ffffff;
      --panel-2: #f7fbff;
      --line: #cdd9ea;
      --text: #162033;
      --muted: #5d6d84;
      --red: #ef3340;
      --black: #1f2937;
      --amber: #ffb020;
      --blue: #2f80ed;
      --green: #18a56d;
      --shadow: 0 16px 42px rgba(39, 65, 103, .16);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(239, 51, 64, .16), transparent 30%),
        radial-gradient(circle at 82% 6%, rgba(47, 128, 237, .18), transparent 34%),
        linear-gradient(180deg, #f9fcff 0%, var(--bg) 52%, #e8f0fb 100%);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      align-items: end;
      margin-bottom: 18px;
      padding: 24px;
      background: linear-gradient(135deg, rgba(255, 255, 255, .94), rgba(241, 247, 255, .84));
      border: 1px solid rgba(101, 125, 160, .22);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 54px);
      letter-spacing: .04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 12px;
      min-width: min(620px, 100%);
    }

    .stat {
      padding: 15px 16px;
      border-radius: 16px;
      background: rgba(47, 128, 237, .07);
      border: 1px solid rgba(47, 128, 237, .14);
    }

    .stat b {
      display: block;
      font-size: 26px;
      margin-bottom: 4px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .filters {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1.3fr repeat(3, minmax(145px, 200px));
      gap: 12px;
      padding: 14px 0;
      background: linear-gradient(180deg, rgba(238, 245, 255, .98), rgba(238, 245, 255, .86));
      backdrop-filter: blur(12px);
    }

    .control {
      width: 100%;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      padding: 13px 14px;
    }

    .control:focus {
      border-color: rgba(90, 167, 255, .95);
      box-shadow: 0 0 0 3px rgba(90, 167, 255, .18);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 4px 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .legend-item {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .045);
      border: 1px solid rgba(101, 125, 160, .18);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.hit { background: var(--red); }
    .dot.miss { background: var(--black); border: 1px solid rgba(255, 255, 255, .36); }
    .dot.mixed { background: var(--amber); }
    .dot.push { background: var(--blue); }
    .dot.pending { background: var(--green); }

    .tabs {
      display: flex;
      gap: 10px;
      margin: 0 0 18px;
      padding: 8px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(101, 125, 160, .18);
      box-shadow: 0 10px 28px rgba(39, 65, 103, .09);
    }

    .tab-btn {
      flex: 0 1 180px;
      padding: 12px 16px;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 13px;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: .03em;
      transition: color .16s ease, background .16s ease, border-color .16s ease, transform .16s ease;
    }

    .tab-btn:hover {
      color: #183153;
      background: rgba(47, 128, 237, .07);
      transform: translateY(-1px);
    }

    .tab-btn.active {
      color: #ffffff;
      background: linear-gradient(135deg, var(--red), var(--blue));
      border-color: rgba(255, 255, 255, .36);
      box-shadow: 0 10px 24px rgba(47, 128, 237, .22);
    }

    .tab-panel[hidden] {
      display: none;
    }

    .section-shell {
      margin: 18px 0 24px;
      padding: 22px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .66);
      border: 1px solid rgba(101, 125, 160, .18);
      box-shadow: 0 12px 32px rgba(39, 65, 103, .08);
    }

    .today-shell {
      background:
        linear-gradient(135deg, rgba(24, 165, 109, .12), rgba(47, 128, 237, .07)),
        rgba(255, 255, 255, .72);
      border-color: rgba(24, 165, 109, .2);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
    }

    .section-head p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .eyebrow {
      display: inline-flex;
      margin: 0 0 8px;
      padding: 5px 9px;
      color: #126a49;
      background: rgba(24, 165, 109, .12);
      border: 1px solid rgba(24, 165, 109, .2);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .section-pill {
      flex: 0 0 auto;
      padding: 8px 12px;
      color: #183153;
      background: rgba(47, 128, 237, .09);
      border: 1px solid rgba(47, 128, 237, .18);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .template-note {
      margin: 0 0 14px;
      padding: 13px 15px;
      color: #35506c;
      background: rgba(24, 165, 109, .08);
      border: 1px solid rgba(24, 165, 109, .18);
      border-radius: 15px;
      line-height: 1.7;
    }

    .date-section {
      margin-top: 24px;
    }

    .date-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 14px;
      font-size: 26px;
    }

    .date-title::before {
      content: "";
      width: 8px;
      height: 28px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--red), var(--blue));
    }

    .series-section {
      margin: 16px 0;
      padding: 18px;
      border-radius: var(--radius);
      background: rgba(24, 33, 51, .76);
      background: rgba(255, 255, 255, .78);
      border: 1px solid rgba(101, 125, 160, .18);
    }

    .series-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 15px;
    }

    .series-head h3 {
      margin: 0;
      font-size: 20px;
    }

    .series-count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      min-height: 140px;
      padding: 15px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .96), rgba(246, 250, 255, .88));
      border: 1px solid rgba(101, 125, 160, .18);
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(47, 128, 237, .35);
      background: linear-gradient(180deg, rgba(255, 255, 255, 1), rgba(235, 244, 255, .92));
    }

    .ball {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 27px;
      line-height: 1;
      box-shadow: inset 0 -8px 16px rgba(0, 0, 0, .22), 0 9px 25px rgba(0, 0, 0, .28);
    }

    .ball.hit { background: var(--red); }
    .ball.miss { background: var(--black); border: 1px solid rgba(255, 255, 255, .18); }
    .ball.mixed { background: var(--amber); color: #161000; }
    .ball.push { background: var(--blue); color: #06111e; }
    .ball.pending { background: var(--green); color: #06170f; }

    .card h4 {
      margin: 0 0 7px;
      font-size: 17px;
      line-height: 1.35;
    }

    .score {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(47, 128, 237, .1);
      color: #183153;
      font-weight: 700;
      margin-bottom: 9px;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .badge {
      padding: 4px 7px;
      border-radius: 999px;
      color: #33506f;
      background: rgba(47, 128, 237, .08);
      border: 1px solid rgba(47, 128, 237, .14);
      font-size: 12px;
    }

    .badge-hit {
      color: #9f1722;
      background: rgba(239, 51, 64, .13);
      border-color: rgba(239, 51, 64, .28);
      font-weight: 700;
    }

    .badge-miss {
      color: #111827;
      background: rgba(17, 24, 39, .12);
      border-color: rgba(17, 24, 39, .28);
      font-weight: 700;
    }

    .badge-mixed {
      color: #8a5200;
      background: rgba(255, 176, 32, .18);
      border-color: rgba(255, 176, 32, .34);
      font-weight: 700;
    }

    .badge-push {
      color: #0f4f98;
      background: rgba(47, 128, 237, .14);
      border-color: rgba(47, 128, 237, .3);
      font-weight: 700;
    }

    .badge-pending {
      color: #126a49;
      background: rgba(24, 165, 109, .14);
      border-color: rgba(24, 165, 109, .3);
      font-weight: 700;
    }

    .empty {
      padding: 36px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .6);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(83, 106, 137, .36);
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(860px, 100%);
      max-height: min(780px, calc(100vh - 44px));
      overflow: auto;
      border-radius: 22px;
      background: #ffffff;
      border: 1px solid rgba(101, 125, 160, .2);
      box-shadow: var(--shadow);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: 62px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 18px 20px;
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid rgba(101, 125, 160, .16);
      backdrop-filter: blur(12px);
    }

    .modal h2 {
      margin: 0 0 4px;
      font-size: 24px;
    }

    .modal-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      color: var(--text);
      background: rgba(47, 128, 237, .08);
      border: 1px solid rgba(47, 128, 237, .16);
      border-radius: 12px;
      cursor: pointer;
    }

    .modal-body {
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .detail-block {
      padding: 15px;
      border-radius: 16px;
      background: rgba(47, 128, 237, .055);
      border: 1px solid rgba(47, 128, 237, .12);
    }

    .detail-block h3 {
      margin: 0 0 9px;
      font-size: 16px;
      color: #183153;
    }

    .detail-block p,
    .detail-block li {
      color: #4f6179;
      line-height: 1.75;
    }

    .detail-block p { margin: 0; }
    .detail-block ul { margin: 0; padding-left: 20px; }

    @media (max-width: 920px) {
      .hero { grid-template-columns: 1fr; }
      .scoreboard { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .filters { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 620px) {
      .app { width: min(100% - 20px, 1440px); padding-top: 12px; }
      .hero { padding: 18px; }
      .tabs { grid-template-columns: 1fr; display: grid; }
      .tab-btn { flex: auto; }
      .section-shell { padding: 16px; }
      .section-head { display: block; }
      .section-pill { display: inline-flex; margin-top: 10px; }
      .filters { grid-template-columns: 1fr; }
      .cards { grid-template-columns: 1fr; }
      .modal-head { grid-template-columns: 52px 1fr auto; }
      .ball { width: 48px; height: 48px; font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <h1>足球红黑榜</h1>
        <p class="subtitle">标签页切换既往红黑榜与今日方案；待赛方案赛后再回填红黑结算。</p>
      </div>
      <div class="scoreboard" id="scoreboard"></div>
    </section>

    <nav class="tabs" role="tablist" aria-label="红黑榜页面切换">
      <button class="tab-btn active" id="todayTab" type="button" role="tab" aria-selected="true" aria-controls="todayPanel" data-panel="todayPanel">今日方案</button>
      <button class="tab-btn" id="historyTab" type="button" role="tab" aria-selected="false" aria-controls="historyPanel" data-panel="historyPanel">既往红黑榜</button>
    </nav>

    <section class="section-shell today-shell tab-panel" id="todayPanel" role="tabpanel" aria-labelledby="todayTab">
      <div class="section-head">
        <div>
          <span class="eyebrow">TODAY PLAN</span>
          <h2 id="todayTitle">今日方案</h2>
          <p>固定模板：足球分析师视角 → 最终推荐方案 → 赔率模型推测 → 自有模型校准 → 风险控制。</p>
        </div>
        <span class="section-pill" id="todayCount"></span>
      </div>
      <p class="template-note">以下为本地三场方案。每张卡片点击后查看完整模板；赛后把实际比分和结算转入“既往红黑榜”。</p>
      <section id="todayBoard"></section>
    </section>

    <section class="section-shell tab-panel" id="historyPanel" role="tabpanel" aria-labelledby="historyTab" hidden>
      <div class="section-head">
        <div>
          <span class="eyebrow">HISTORY</span>
          <h2 id="historyTitle">既往红黑榜</h2>
          <p>保留前面的红黑榜记录，支持按日期、系列赛、结果和关键词筛选。</p>
        </div>
        <span class="section-pill">赛后复盘</span>
      </div>

      <section class="filters" aria-label="筛选">
        <input class="control" id="searchInput" type="search" placeholder="搜索球队、盘口、经验关键词...">
        <select class="control" id="dateFilter"></select>
        <select class="control" id="seriesFilter"></select>
        <select class="control" id="statusFilter">
          <option value="all">全部结果</option>
          <option value="hit">只看红</option>
          <option value="miss">只看黑</option>
          <option value="mixed">只看半中/混合</option>
          <option value="push">只看走水</option>
        </select>
      </section>

      <div class="legend">
        <span class="legend-item"><span class="dot hit"></span>红：推荐结构命中</span>
        <span class="legend-item"><span class="dot miss"></span>黑：主方向失误</span>
        <span class="legend-item"><span class="dot mixed"></span>半中/混合：方向部分对、结构不优</span>
        <span class="legend-item"><span class="dot push"></span>走水：主盘口退回本金</span>
        <span class="legend-item"><span class="dot pending"></span>待赛：今日方案未结算</span>
      </div>

      <section id="board"></section>
    </section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <article class="modal">
      <header class="modal-head">
        <div class="ball" id="modalBall">⚽</div>
        <div>
          <h2 id="modalTitle"></h2>
          <div class="modal-meta" id="modalMeta"></div>
        </div>
        <button class="close-btn" id="modalClose" aria-label="关闭">×</button>
      </header>
      <div class="modal-body" id="modalBody"></div>
    </article>
  </div>

  <script>
    const records = [
      {

      {

        score: "0-3",
        status: "mixed",
        label: "半中",

    const statusText = {
      hit: "红",
      miss: "黑",
      mixed: "半中",
      push: "走水",
      pending: "待赛"
    };

    const todayBoard = document.getElementById("todayBoard");
    const todayCount = document.getElementById("todayCount");
    const board = document.getElementById("board");
    const scoreboard = document.getElementById("scoreboard");
    const searchInput = document.getElementById("searchInput");
    const dateFilter = document.getElementById("dateFilter");
    const seriesFilter = document.getElementById("seriesFilter");
    const statusFilter = document.getElementById("statusFilter");
    const tabButtons = document.querySelectorAll(".tab-btn");
    const tabPanels = document.querySelectorAll(".tab-panel");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalBall = document.getElementById("modalBall");
    const modalTitle = document.getElementById("modalTitle");
    const modalMeta = document.getElementById("modalMeta");
    const modalBody = document.getElementById("modalBody");
    const modalClose = document.getElementById("modalClose");

    function unique(values) {
      return [...new Set(values)].sort();
    }

    function optionList(select, label, values) {
      select.innerHTML = `<option value="all">${label}</option>` +
        values.map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function recordText(record) {
      return [
        record.date,
        record.series,
        record.match,
        record.score,
        record.summary,
        record.review,
        ...(record.plan || []),
        ...(record.settlement || []),
        ...(record.lessons || [])
      ].join(" ").toLowerCase();
    }

    function getFilteredRecords() {
      const q = searchInput.value.trim().toLowerCase();
      return records.filter(record => {
        const dateOk = dateFilter.value === "all" || record.date === dateFilter.value;
        const seriesOk = seriesFilter.value === "all" || record.series === seriesFilter.value;
        const statusOk = statusFilter.value === "all"
          || record.status === statusFilter.value
          || (statusFilter.value === "mixed" && hasMixed(record))
          || (statusFilter.value === "push" && hasPush(record));
        const searchOk = !q || recordText(record).includes(q);
        return dateOk && seriesOk && statusOk && searchOk;
      });
    }

    function renderStats(list) {
      const bestOutcomes = list.map(bestOutcome);
      const hit = bestOutcomes.filter(status => status === "hit").length;
      const miss = bestOutcomes.filter(status => status === "miss").length;
      const mixed = bestOutcomes.filter(status => status === "mixed").length;
      const push = bestOutcomes.filter(status => status === "push").length;
      const weightedHits = hit + mixed * .5 + push * .5;
      const hitRate = list.length ? Math.round(weightedHits / list.length * 100) : 0;
      scoreboard.innerHTML = [
        { value: list.length, label: "既往展示" },
        { value: hit, label: "最好为红" },
        { value: miss, label: "最好为黑" },
        { value: mixed, label: "最好半中" },
        { value: push, label: "最好走水" },
        { value: `${hitRate}%`, label: "折算命中率" }
      ].map(item => `<div class="stat"><b>${item.value}</b><span>${item.label}</span></div>`).join("");
    }

    function groupBy(list, key) {
      return list.reduce((acc, item) => {
        const value = item[key];
        if (!acc[value]) acc[value] = [];
        acc[value].push(item);
        return acc;
      }, {});
    }

    function activateTab(panelId) {
      tabButtons.forEach(button => {
        const active = button.dataset.panel === panelId;
        button.classList.toggle("active", active);
        button.setAttribute("aria-selected", String(active));
      });

      tabPanels.forEach(panel => {
        panel.hidden = panel.id !== panelId;
      });
    }

    function renderTodayBoard() {
      todayCount.textContent = `${todayPlans.length} 个方案`;

      const byDate = groupBy(todayPlans, "date");
      const html = Object.keys(byDate).sort().map(date => {
        const seriesMap = groupBy(byDate[date], "series");
        const seriesHtml = Object.keys(seriesMap).sort().map(series => {
          const cards = seriesMap[series]
            .map(record => renderCard(record, "today", todayPlans.indexOf(record)))
            .join("");
          return `
            <section class="series-section">
              <div class="series-head">
                <h3>${escapeHtml(series)}</h3>
                <span class="series-count">${seriesMap[series].length} 个方案</span>
              </div>
              <div class="cards">${cards}</div>
            </section>
          `;
        }).join("");

        return `
          <section class="date-section">
            <h2 class="date-title">${escapeHtml(date)}</h2>
            ${seriesHtml}
          </section>
        `;
      }).join("");

      todayBoard.innerHTML = html;
    }

    function renderBoard() {
      const list = getFilteredRecords();
      renderStats(list);

      if (!list.length) {
        board.innerHTML = `<div class="empty">没有匹配记录。换个日期、系列赛或关键词。</div>`;
        return;
      }

      const byDate = groupBy(list, "date");
      const html = Object.keys(byDate).sort().map(date => {
        const seriesMap = groupBy(byDate[date], "series");
        const seriesHtml = Object.keys(seriesMap).sort().map(series => {
          const cards = seriesMap[series]
            .map(record => renderCard(record, "history", records.indexOf(record)))
            .join("");
          return `
            <section class="series-section">
              <div class="series-head">
                <h3>${escapeHtml(series)}</h3>
                <span class="series-count">${seriesMap[series].length} 场</span>
              </div>
              <div class="cards">${cards}</div>
            </section>
          `;
        }).join("");

        return `
          <section class="date-section">
            <h2 class="date-title">${escapeHtml(date)}</h2>
            ${seriesHtml}
          </section>
        `;
      }).join("");

      board.innerHTML = html;
    }

    function renderCard(record, source = "history", index = records.indexOf(record)) {
      const cardText = record.status === "pending"
        ? (record.plan || []).join("；")
        : record.summary;
      return `
        <button class="card" data-source="${source}" data-index="${index}">
          <div class="ball ${record.status}" aria-hidden="true">⚽</div>
          <div>
            <h4>${escapeHtml(record.match)}</h4>
            <div class="score">${escapeHtml(record.score)}</div>
            <p>${escapeHtml(cardText)}</p>
          </div>
        </button>
      `;
    }

    function settlementText(record) {
      return (record.settlement || []).join(" ");
    }

    function hasFullWin(record) {
      return record.status === "hit" || /全赢|命中|赢|胜/.test(settlementText(record));
    }

    function hasPush(record) {
      return record.status === "push" || /走水|推|DNB推|全退|退回本金/.test(settlementText(record));
    }

    function hasMixed(record) {
      return record.status === "mixed" || /半中|半赢|赢半|半输|输半|半红|半黑/.test(settlementText(record));
    }

    function bestOutcome(record) {
      if (hasFullWin(record)) return "hit";
      if (hasMixed(record)) return "mixed";
      if (hasPush(record)) return "push";
      return "miss";
    }

    function listHtml(items) {
      return `<ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }

    function openModal(record) {
      const isPending = record.status === "pending";
      modalBall.className = `ball ${record.status}`;
      modalBall.textContent = "⚽";
      modalTitle.textContent = record.match;
      modalMeta.textContent = `${record.date} · ${record.series} · ${record.score} · ${statusText[record.status] || record.label}`;
      modalBody.innerHTML = `
        <section class="detail-block">
          <h3>${isPending ? "足球分析师视角" : "结论"}</h3>
          <p>${escapeHtml(record.summary)}</p>
        </section>
        <section class="detail-block">
          <h3>${isPending ? "最终推荐方案" : "赛前方案 / 盘口结构"}</h3>
          ${listHtml(record.plan || [])}
        </section>
        <section class="detail-block">
          <h3>${isPending ? "赔率模型推测" : "结算"}</h3>
          ${listHtml(record.settlement || [])}
        </section>
        <section class="detail-block">
          <h3>${isPending ? "自有模型校准" : "复盘"}</h3>
          <p>${escapeHtml(record.review)}</p>
        </section>
        <section class="detail-block">
          <h3>${isPending ? "风险控制" : "经验校准"}</h3>
          ${listHtml(record.lessons || [])}
        </section>
      `;
      modalBackdrop.classList.add("open");
    }

    function closeModal() {
      modalBackdrop.classList.remove("open");
    }

    function init() {
      optionList(dateFilter, "全部日期", unique(records.map(r => r.date)));
      optionList(seriesFilter, "全部系列赛", unique(records.map(r => r.series)));
      renderTodayBoard();
      renderBoard();
      activateTab("todayPanel");
    }

    [searchInput, dateFilter, seriesFilter, statusFilter].forEach(el => {
      el.addEventListener("input", renderBoard);
      el.addEventListener("change", renderBoard);
    });

    tabButtons.forEach(button => {
      button.addEventListener("click", () => activateTab(button.dataset.panel));
    });

    board.addEventListener("click", event => {
      const card = event.target.closest(".card");
      if (!card) return;
      openModal(records[Number(card.dataset.index)]);
    });

    todayBoard.addEventListener("click", event => {
      const card = event.target.closest(".card");
      if (!card) return;
      openModal(todayPlans[Number(card.dataset.index)]);
    });

    modalClose.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", event => {
      if (event.target === modalBackdrop) closeModal();
    });
    window.addEventListener("keydown", event => {
      if (event.key === "Escape") closeModal();
    });

    init();
  </script>
